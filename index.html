let currentFilter = 'all';
let selectedId = null;

function getBadgeClass(type) {
  return { kms: 'badge-kms', ai: 'badge-ai', platform: 'badge-platform', integrator: 'badge-integrator', light: 'badge-light' }[type] || '';
}

function getStatusTags(v) {
  const tags = [];
  if (v.isNew) tags.push('<span class="status-tag" style="background:#E6F1FB;color:#185FA5;border:0.5px solid #B5D4F4;">новый</span>');
  if (v.warnCard) tags.push('<span class="status-tag" style="background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1;">не On-Premise</span>');
  if (!v.ready) tags.push('<span class="status-tag" style="background:#FAEEDA;color:#854F0B;border:0.5px solid #FAC775;">кастом</span>');
  if (v.priced) tags.push('<span class="status-tag" style="background:#E1F5EE;color:#0F6E56;border:0.5px solid #9FE1CB;">цена известна</span>');
  return tags.join('');
}

function getFitStars(n) {
  let s = '';
  for (let i = 0; i < 5; i++) s += '<div class="star ' + (i < n ? 'on' : 'off') + '"></div>';
  return s;
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = vendors.map((v, idx) => `
    <div class="card ${v.warnCard ? 'warn-card' : ''} ${v.isNew ? 'new-card' : ''} ${selectedId === v.id ? 'selected' : ''} ${isHidden(v) ? 'hidden' : ''}" onclick="selectCard('${v.id}')" id="card-${v.id}">
      <div class="card-header">
        <div class="card-title-row">
          <div class="company">${v.name}</div>
          <div class="price-num">#${idx + 1}</div>
        </div>
        <div class="card-meta-row">
          <div class="type-badge ${getBadgeClass(v.type)}">${v.typeName}</div>
          ${getStatusTags(v)}
        </div>
      </div>
      <div class="desc">${v.desc}</div>
      <div class="sort-reason">${v.sortReason}</div>
      <div class="pills">
        <span class="pill ${v.onprem ? 'yes' : 'no'}">${v.onprem ? 'On-Premise' : 'Только облако'}</span>
        <span class="pill ${v.ready ? 'yes' : 'warn'}">${v.ready ? 'Готовое решение' : 'Кастом'}</span>
        <span class="pill ${v.aiLayer ? 'yes' : 'no'}">ИИ-ассистент</span>
        <span class="pill ${v.priced ? 'yes' : ''}">${v.priced ? 'Цена известна' : 'Цена по запросу'}</span>
        ${(v.warnTags || []).map(t => '<span class="pill no">' + t + '</span>').join('')}
      </div>
      <div class="price-section">
        <div class="price-row">
          <div class="price-label">Ориентир:</div>
          <div class="price-val">${v.priceShort}</div>
        </div>
        <div class="price-row" style="margin-top:4px;">
          <div class="price-label">Подходит:</div>
          <div class="stars">${getFitStars(v.fit)}</div>
        </div>
      </div>
    </div>
  `).join('');
  updateCounts();
}

function isHidden(v) {
  if (currentFilter === 'all') return false;
  if (currentFilter === 'onprem') return !v.onprem;
  if (currentFilter === 'priced') return !v.priced;
  return v.type !== currentFilter;
}

function filter(btn, f) {
  currentFilter = f;
  document.querySelectorAll('.flt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closeDetail();
  renderCards();
}

function updateCounts() {
  const visible = vendors.filter(v => !isHidden(v));
  document.getElementById('cnt-total').textContent = visible.length;
  document.getElementById('cnt-onprem').textContent = visible.filter(v => v.onprem).length;
  document.getElementById('cnt-ready').textContent = visible.filter(v => v.ready).length;
  document.getElementById('cnt-priced').textContent = visible.filter(v => v.priced).length;
}

function selectCard(id) {
  if (selectedId === id) { closeDetail(); return; }
  selectedId = id;
  const v = vendors.find(x => x.id === id);
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + id).classList.add('selected');

  document.getElementById('d-title').innerHTML = '<span style="font-weight:500">' + v.name + '</span><span class="type-badge ' + getBadgeClass(v.type) + '">' + v.typeName + '</span>' + getStatusTags(v);

  const warnDiv = document.getElementById('d-warning');
  warnDiv.innerHTML = v.warning ? '<div class="warning-note">' + v.warning + '</div>' : '';

  const pricingDiv = document.getElementById('d-pricing');
  if (v.pricing.length > 0) {
    pricingDiv.innerHTML = '<div class="pricing-table"><div class="pricing-table-title">Детализация стоимости</div>' +
      v.pricing.map(p => '<div class="pricing-row"><div class="pricing-row-label">' + p.label + (p.note ? ' <span style="font-size:10px;color:var(--color-text-tertiary);">— ' + p.note + '</span>' : '') + '</div><div class="pricing-row-val' + (p.accent ? ' accent' : '') + '">' + p.val + '</div></div>').join('') +
      '</div>';
  } else {
    pricingDiv.innerHTML = '';
  }

  document.getElementById('d-grid').innerHTML = `
    <div class="detail-block"><div class="detail-block-label">Клиенты</div><div class="detail-block-val">${v.clients}</div></div>
    <div class="detail-block"><div class="detail-block-label">Старт проекта</div><div class="detail-block-val">${v.start}</div></div>
    <div class="detail-block"><div class="detail-block-label">Функциональность</div><div class="detail-block-val">${v.features}</div></div>
    <div class="detail-block"><div class="detail-block-label">Технологии</div><div class="detail-block-val">${v.stack}</div></div>
  `;

  document.getElementById('d-pros-cons').innerHTML = `
    <div class="pros"><div class="pros-label">Преимущества</div>${v.pros.map(p => '<div class="pro-item">' + p + '</div>').join('')}</div>
    <div class="cons"><div class="cons-label">Недостатки</div>${v.cons.map(c => '<div class="con-item">' + c + '</div>').join('')}</div>
  `;

  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  selectedId = null;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  document.getElementById('detail-panel').classList.remove('open');
}

function askMore() {
  if (!selectedId) return;
  const v = vendors.find(x => x.id === selectedId);
  sendPrompt('Расскажи подробнее про ' + v.name + ' — что конкретно нужно уточнить на пресейле, какие вопросы задать, и как они подходят для создания внутренней базы знаний с ИИ-ассистентом в закрытом контуре?');
}

renderCards();
</script>
